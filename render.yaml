services:
  - type: web
    name: goat-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_SSL_MODE
        value: require
      - key: FRONTEND_URL
        sync: false
      - key: EXTRA_CORS_ORIGINS
        sync: false
      - key: GOOGLE_SHEETS_CREDENTIALS_FILE
        value: google-credentials.json
      - key: GOOGLE_SPREADSHEET_ID
        value: ""
      - key: SYNC_INTERVAL_MINUTES
        value: "15"
      - key: GROQ_API_KEY
        sync: false
